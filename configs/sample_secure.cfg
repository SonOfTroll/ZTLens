!
! properly secured campus network config
! this is what a good zero trust config looks like
! use this to compare against the bad one
!
version 15.1
no service timestamps log datetime msec
no service timestamps debug datetime msec
service password-encryption
!
hostname SecureSwitch1
!
enable secret 5 $1$mERr$hx5rVt7rPNoS4wqbXKX7m0
!
!
!
ip cef
no ipv6 cef
!
!
vlan 10
 name Finance
!
vlan 20
 name HR
!
vlan 30
 name Guest
!
vlan 99
 name Management
!
vlan 999
 name NativeVLAN
!
!
spanning-tree mode rapid-pvst
spanning-tree portfast default
spanning-tree portfast bpduguard default
!
!
interface FastEthernet0/1
 description Finance User Port
 switchport access vlan 10
 switchport mode access
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 switchport port-security mac-address sticky
!
interface FastEthernet0/2
 description Finance User Port 2
 switchport access vlan 10
 switchport mode access
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 switchport port-security mac-address sticky
!
interface FastEthernet0/3
 description HR User Port
 switchport access vlan 20
 switchport mode access
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 switchport port-security mac-address sticky
!
interface FastEthernet0/4
 description HR User Port 2
 switchport access vlan 20
 switchport mode access
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 switchport port-security mac-address sticky
!
interface FastEthernet0/5
 description Guest Port
 switchport access vlan 30
 switchport mode access
 switchport port-security
 switchport port-security maximum 1
 switchport port-security violation shutdown
!
interface FastEthernet0/6
 description Guest Port 2
 switchport access vlan 30
 switchport mode access
 switchport port-security
 switchport port-security maximum 1
 switchport port-security violation shutdown
!
interface GigabitEthernet0/1
 description Trunk to Core Router
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,99
 switchport mode trunk
!
interface GigabitEthernet0/2
 description Trunk to Distribution Switch
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,99
 switchport mode trunk
!
interface Vlan99
 ip address 192.168.99.2 255.255.255.0
 no shutdown
!
!
! --- ROUTER CONFIG (Router on a Stick) ---
!
interface GigabitEthernet0/0
 no shutdown
!
interface GigabitEthernet0/0.10
 description Finance Gateway
 encapsulation dot1Q 10
 ip address 192.168.10.1 255.255.255.0
 ip access-group FINANCE_IN in
 ip access-group FINANCE_OUT out
!
interface GigabitEthernet0/0.20
 description HR Gateway
 encapsulation dot1Q 20
 ip address 192.168.20.1 255.255.255.0
 ip access-group HR_IN in
 ip access-group HR_OUT out
!
interface GigabitEthernet0/0.30
 description Guest Gateway
 encapsulation dot1Q 30
 ip address 192.168.30.1 255.255.255.0
 ip access-group GUEST_IN in
 ip access-group GUEST_OUT out
!
interface GigabitEthernet0/0.99
 description Management Gateway
 encapsulation dot1Q 99
 ip address 192.168.99.1 255.255.255.0
 ip access-group MGMT_IN in
!
!
! named acls with tight rules
!
ip access-list extended FINANCE_IN
 permit tcp 192.168.10.0 0.0.0.255 192.168.20.0 0.0.0.255 eq 443
 permit icmp 192.168.10.0 0.0.0.255 192.168.99.0 0.0.0.255
 deny ip 192.168.10.0 0.0.0.255 192.168.30.0 0.0.0.255
 deny ip any any
!
ip access-list extended FINANCE_OUT
 permit tcp 192.168.20.0 0.0.0.255 192.168.10.0 0.0.0.255 established
 deny ip 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255
 deny ip any any
!
ip access-list extended HR_IN
 permit tcp 192.168.20.0 0.0.0.255 192.168.10.0 0.0.0.255 eq 443
 deny ip 192.168.20.0 0.0.0.255 192.168.30.0 0.0.0.255
 deny ip any any
!
ip access-list extended HR_OUT
 permit tcp 192.168.10.0 0.0.0.255 192.168.20.0 0.0.0.255 established
 deny ip 192.168.30.0 0.0.0.255 192.168.20.0 0.0.0.255
 deny ip any any
!
ip access-list extended GUEST_IN
 permit udp 192.168.30.0 0.0.0.255 any eq 53
 permit tcp 192.168.30.0 0.0.0.255 any eq 80
 permit tcp 192.168.30.0 0.0.0.255 any eq 443
 deny ip 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255
 deny ip 192.168.30.0 0.0.0.255 192.168.20.0 0.0.0.255
 deny ip 192.168.30.0 0.0.0.255 192.168.99.0 0.0.0.255
 deny ip any any
!
ip access-list extended GUEST_OUT
 deny ip any 192.168.30.0 0.0.0.255
!
ip access-list extended MGMT_IN
 permit ip 192.168.99.0 0.0.0.255 192.168.99.0 0.0.0.255
 deny ip any any
!
!
ip classless
!
ip flow-export version 9
!
!
line con 0
!
line aux 0
!
line vty 0 4
 login
 transport input ssh
!
!
end
