!
! sample campus network config with intentional misconfigurations
! exported from packet tracer - 3 layer campus design
! this config has several zero trust violations for testing
!
version 15.1
no service timestamps log datetime msec
no service timestamps debug datetime msec
service password-encryption
!
hostname CampusSwitch1
!
enable secret 5 $1$mERr$hx5rVt7rPNoS4wqbXKX7m0
!
!
!
!
!
!
ip cef
no ipv6 cef
!
!
!
!
vlan 10
 name Finance
!
vlan 20
 name HR
!
vlan 30
 name Guest
!
vlan 99
 name Management
!
!
spanning-tree mode pvst
!
!
!
!
interface FastEthernet0/1
 description Finance User Port
 switchport access vlan 10
 switchport mode access
!
interface FastEthernet0/2
 description Finance User Port 2
 switchport access vlan 10
 switchport mode access
!
interface FastEthernet0/3
 description HR User Port
 switchport access vlan 20
 switchport mode access
!
interface FastEthernet0/4
 description HR User Port 2
 switchport access vlan 20
 switchport mode access
!
interface FastEthernet0/5
 description Guest Port
 switchport access vlan 30
 switchport mode access
!
interface FastEthernet0/6
 description Guest Port 2
 switchport access vlan 30
 switchport mode access
!
interface GigabitEthernet0/1
 description Trunk to Core Router
 switchport trunk allowed vlan 10,20,30,99
 switchport mode trunk
!
interface GigabitEthernet0/2
 description Trunk to Distribution Switch
 switchport trunk allowed vlan 10,20,30,99
 switchport mode trunk
!
interface Vlan99
 ip address 192.168.99.2 255.255.255.0
 no shutdown
!
!
! --- ROUTER CONFIG (Router on a Stick) ---
!
! This would be on the core router but were including it
! here for the auditor to analyze
!
interface GigabitEthernet0/0
 no shutdown
!
interface GigabitEthernet0/0.10
 description Finance Gateway
 encapsulation dot1Q 10
 ip address 192.168.10.1 255.255.255.0
!
interface GigabitEthernet0/0.20
 description HR Gateway
 encapsulation dot1Q 20
 ip address 192.168.20.1 255.255.255.0
!
interface GigabitEthernet0/0.30
 description Guest Gateway
 encapsulation dot1Q 30
 ip address 192.168.30.1 255.255.255.0
!
interface GigabitEthernet0/0.99
 description Management Gateway
 encapsulation dot1Q 99
 ip address 192.168.99.1 255.255.255.0
!
!
! ACLs - these are intentionally misconfigured
!
! this acl is way too broad - lets guest reach everything
access-list 101 permit ip 192.168.30.0 0.0.0.255 any
access-list 101 deny ip any any
!
! this acl tries to protect finance but has a hole
access-list 102 permit ip 192.168.10.0 0.0.0.255 192.168.20.0 0.0.0.255
access-list 102 permit ip 192.168.10.0 0.0.0.255 192.168.99.0 0.0.0.255
access-list 102 deny ip 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255
access-list 102 permit ip any any
!
!
! note: no acls applied to subinterfaces
! note: no port security on any access ports
! note: native vlan is still 1 on trunks (default)
! note: no bpdu guard or portfast
! note: guest vlan can reach finance and hr subnets
!
!
ip classless
!
ip flow-export version 9
!
!
line con 0
!
line aux 0
!
line vty 0 4
 login
!
!
end
